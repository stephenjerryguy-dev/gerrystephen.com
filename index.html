<script>
const GERRY_SHELL_VERSION = 'ecosystems-app-97';
function gerryShellStorage() {
  try {
    return window.localStorage || null;
  } catch (_) {
    return null;
  }
}
async function resetOldGerryShell() {
  try {
    const shellStorage = gerryShellStorage();
    const currentVersion = shellStorage?.getItem('gerry-shell-version');
    const forcedReset = new URLSearchParams(window.location.search).has('reset');
    shellStorage?.setItem('gerry-shell-version', GERRY_SHELL_VERSION);
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.filter((key) => key.includes('gerry-iglu')).map((key) => caches.delete(key)));
    }
    if ('serviceWorker' in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map((registration) => registration.unregister()));
      if ((currentVersion !== GERRY_SHELL_VERSION && navigator.serviceWorker.controller) || forcedReset) {
        const next = new URL(window.location.href);
        next.searchParams.set('v', GERRY_SHELL_VERSION);
        next.searchParams.delete('reset');
        window.location.replace(next.toString());
        return true;
      }
    }
  } catch (_) {}
  return false;
}
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    resetOldGerryShell().catch(() => {});
  });
}
</script>
