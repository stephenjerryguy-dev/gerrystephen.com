name: JerryQuant Live (approve on mobile)

# Two windows a day, so a trend recognized at the close is placed at the open:
#   * After the US close  -> "preview" only: recompute and post the day's
#     proposed tickets to the run summary. Places nothing, no approval needed.
#     This is the heads-up that a trend has been recognized.
#   * At the US open       -> "propose" then a gated "execute": recompute on
#     fresh prices, you approve in the GitHub mobile app, and it places EXACTLY
#     the proposed tickets at the open (fresh price-deviation guard applied).
# Manual runs (workflow_dispatch) do the full propose -> approve -> execute.
#
# SETUP (one-time, only you can do these):
#   1. Repo Settings -> Environments -> New environment "live-trading".
#      Add yourself under "Required reviewers" (this is the mobile approval gate).
#   2. Repo Settings -> Secrets and variables -> Actions -> add:
#        ROBINHOOD_MCP_URL, ROBINHOOD_MCP_API_KEY,
#        ROBINHOOD_MCP_REFRESH_TOKEN, ROBINHOOD_ACCOUNT_NUMBER
#   3. Merge to the default branch so the schedules arm.
#
# DST NOTE: cron is UTC and does not shift for daylight saving. The OPEN cron
# below (13:35 UTC) is 9:35 AM ET during EDT (Mar-Nov). In EST (Nov-Mar) the
# US open is 14:30 UTC, so change OPEN to "35 14 * * 1-5" for the winter.
#
# SECURITY: GitHub-hosted runners hold the token as an encrypted secret. For
# the most tamper-resistant setup, use a self-hosted runner on your own machine
# and point JERRYQUANT_ENV_PATH at a local .env so the token never leaves it.

on:
  workflow_dispatch:
  schedule:
    - cron: "35 21 * * 1-5"   # after US close  -> preview (heads-up only)
    - cron: "35 13 * * 1-5"   # at US open (EDT) -> propose + gated execute

permissions:
  contents: write

concurrency:
  group: jerryquant-live
  cancel-in-progress: false

env:
  ROBINHOOD_MCP_URL: ${{ secrets.ROBINHOOD_MCP_URL }}
  ROBINHOOD_MCP_API_KEY: ${{ secrets.ROBINHOOD_MCP_API_KEY }}
  ROBINHOOD_MCP_REFRESH_TOKEN: ${{ secrets.ROBINHOOD_MCP_REFRESH_TOKEN }}
  ROBINHOOD_ACCOUNT_NUMBER: ${{ secrets.ROBINHOOD_ACCOUNT_NUMBER }}

jobs:
  # ---- after-close heads-up: recognize the trend, place nothing ----
  preview:
    if: github.event.schedule == '35 21 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: JerryQuant/requirements.txt
      - run: pip install -r JerryQuant/requirements.txt
      - name: Preview proposed tickets (places nothing)
        run: |
          cd JerryQuant
          python main.py --mode live_propose
          cat live_pending.md >> "$GITHUB_STEP_SUMMARY"

  # ---- at-open: recompute on fresh prices and stage for approval ----
  propose:
    if: github.event.schedule == '35 13 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      has_actions: ${{ steps.propose.outputs.has_actions }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: JerryQuant/requirements.txt
      - run: pip install -r JerryQuant/requirements.txt
      - name: Propose live actions (read-only, places nothing)
        id: propose
        run: |
          cd JerryQuant
          python main.py --mode live_propose
          cat live_pending.md >> "$GITHUB_STEP_SUMMARY"
          n=$(python -c "import json;print(len(json.load(open('live_pending.json'))['actions']))")
          echo "has_actions=$([ "$n" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: live-pending
          path: JerryQuant/live_pending.json
          retention-days: 5

  # ---- gated execute: fills at the open after your mobile approval ----
  execute:
    needs: propose
    if: needs.propose.outputs.has_actions == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: live-trading   # <-- pauses here until YOU approve on mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: JerryQuant/requirements.txt
      - run: pip install -r JerryQuant/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: live-pending
          path: JerryQuant
      - name: Execute approved tickets at the open
        run: cd JerryQuant && python main.py --mode live_execute
      - name: Persist live state to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f JerryQuant/jerryquant.db JerryQuant/live_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "JerryQuant live state: $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}"
