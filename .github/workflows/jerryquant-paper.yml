name: JerryQuant Paper Trading

on:
  # PAUSED 2026-06-15 — running live only for now. The daily schedule is
  # commented out so paper no longer runs automatically; it stays available
  # on demand (Actions -> Run workflow). To resume, uncomment the cron.
  # schedule:
  #   - cron: "30 21 * * *"   # daily 21:30 UTC, after US close
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jerryquant-paper
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: JerryQuant/requirements.txt

      - name: Install dependencies
        run: pip install -r JerryQuant/requirements.txt

      - name: Run daily paper cycle
        env:
          SMTP_HOST: ${{ secrets.SMTP_USER != '' && 'smtp.gmail.com' || '' }}
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_EMAIL_TO: ${{ secrets.SMTP_USER }}
        run: cd JerryQuant && python main.py --mode paper

      - name: Publish report to run summary
        if: always()
        run: |
          latest=$(ls -t JerryQuant/logs/reports/report_*.md 2>/dev/null | head -1)
          if [ -n "$latest" ]; then
            cat "$latest" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Persist paper state to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f JerryQuant/jerryquant.db JerryQuant/paper_state.json \
                     JerryQuant/logs/reports/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "JerryQuant paper state: $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "${GITHUB_REF_NAME}"
