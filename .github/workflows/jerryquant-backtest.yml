name: JerryQuant Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: JerryQuant/requirements.txt

      - name: Install dependencies
        run: pip install -r JerryQuant/requirements.txt

      - name: Run test suite
        run: cd JerryQuant && python -m pytest -q

      - name: Run backtest
        run: |
          cd JerryQuant
          python main.py --mode backtest | tee backtest_output.txt
          {
            echo "## JerryQuant backtest — $(date -u +%Y-%m-%d)"
            echo '```'
            cat backtest_output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
