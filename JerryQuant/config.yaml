# JerryQuant configuration
#
# Capital preservation comes first. Every default in this file is
# deliberately conservative. Loosening a limit here does NOT bypass the
# hard floors enforced in code (risk/ modules) — code wins on conflict.

mode: BACKTEST          # BACKTEST | PAPER | LIVE_REVIEW | LIVE_APPROVED

account:
  # Owner decision 2026-06-12: the live test runs with $100 in Robinhood's
  # dedicated agentic account. All sizing/limits are computed from this.
  starting_equity_usd: 100.0
  base_currency: USD

watchlist:
  crypto:               # traded as -USD pairs via the data layer
    - BTC
    - ETH
    - SOL
  equities:
    - SPY
    - QQQ
    - IWM                # Russell 2000 small-caps — broad US equity sleeve
    - IBIT               # spot Bitcoin ETF — crypto exposure on equity rails
    - ETHA               # spot Ethereum ETF — crypto exposure on equity rails

risk:
  max_risk_per_trade_pct: 1.0        # max % of account equity risked per trade
  max_daily_drawdown_pct: 5.0        # trading halts for the day past this
  max_total_drawdown_pct: 10.0       # kill switch engages permanently past this
  max_monthly_loss_pct: 3.0          # testing-phase monthly loss kill switch
  max_single_asset_pct: 20.0         # max portfolio allocation to one asset
  max_crypto_allocation_pct: 40.0    # max combined crypto allocation
  max_open_positions: 3
  min_risk_reward: 2.0               # no trade below 2:1
  min_confidence: 70                 # no trade below 70/100
  max_spread_pct: 0.5                # no trade if bid/ask spread exceeds this
  min_dollar_volume_20d: 1000000     # liquidity floor: avg 20-day dollar volume
  max_atr_pct: 8.0                   # extreme-volatility cutoff (ATR as % of price)
  min_atr_pct: 0.2                   # dead-market cutoff
  correlation:                       # correlation-aware exposure & sizing
    enabled: true
    clusters:                        # correlated names share a combined cap
      crypto: [BTC, ETH, SOL]
      crypto_etf: [IBIT, ETHA]       # spot-crypto ETFs move with their coin, not the S&P
      equity_index: [SPY, QQQ, IWM]
    max_cluster_pct: 50.0            # max combined allocation to one cluster
    haircut_threshold: 0.6           # correlation above this shrinks a new position
    max_haircut: 0.5                 # never shrink a position by more than this
    lookback_days: 60                # window for measuring realized correlation

strategy:
  trend_following:
    enabled: true
    fast_ma: 50
    slow_ma: 200
    volume_ma: 20
    atr_period: 14
    atr_stop_multiple: 2.0
    pullback_lookback: 10
    # --- exit management (let winners run, cut dead capital) ---
    use_trailing_stop: true          # chandelier trailing stop; replaces fixed target
    trail_atr_multiple: 3.0          # trail = highest high - this * ATR
    trail_lookback: 22               # bars for the chandelier high
    max_holding_days: 90             # time stop; 0 disables
    time_stop_min_gain_pct: 2.0      # exit at time stop only if gain below this
    scale_out_enabled: true          # take partial profit at scale_out_r
    scale_out_r: 1.5                 # R multiple at which to scale out
    scale_out_fraction: 0.5          # fraction of the position to sell
    breakeven_after_scale: true      # ratchet stop to entry after scaling out
  momentum:
    enabled: false                   # placeholder, not active at launch
  regime:                            # market-regime gate: no new longs in bad tapes
    enabled: true
    benchmark: SPY                   # the market proxy
    benchmark_ma: 200                # benchmark must be above this MA to go long
    require_benchmark_uptrend: true
    min_breadth_pct: 40.0            # min % of the universe above its own MA
    breadth_ma: 200
    max_benchmark_atr_pct: 0.0       # 0 disables the volatility-regime gate

signals:
  sentiment_max_confidence_adjust: 10      # sentiment can only nudge confidence
  prediction_market_max_confidence_adjust: 10

data:
  provider: yfinance
  history_days: 400                  # enough for a 200-day MA plus warmup
  max_staleness_hours_equity: 30     # data older than this => no trading
  max_staleness_hours_crypto: 3
  crypto_quote: USD

backtest:
  start_date: "2020-01-01"
  end_date: null                     # null = today
  fee_pct: 0.10                      # per side
  slippage_pct: 0.05
  spread_pct: 0.05

paper:
  fee_pct: 0.10
  slippage_pct: 0.05
  spread_pct: 0.05

execution:
  require_manual_approval: true      # non-negotiable for live modes
  live_trading_enabled: true         # armed by owner 2026-06-12 ($100 agentic account)
  halt_file: HALT_TRADING.txt
  use_marketable_limit: true         # limit orders once a position is >=1 whole share
  limit_buffer_pct: 0.25             # marketable limit sits this far through the quote
  max_buy_deviation_pct: 1.5         # abort a buy if the quote is this far above reference

database:
  path: jerryquant.db

reporting:
  output_dir: logs/reports
  email:
    enabled: true                    # falls back to terminal+file if SMTP unset
    recipient: stephenjerryguy@gmail.com

logging:
  level: INFO
  dir: logs
